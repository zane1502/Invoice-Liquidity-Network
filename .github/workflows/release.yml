# ==============================================================================
# Release — Issue #247
#
# When changesets are merged into main, this workflow opens a "Version Packages"
# PR that bumps versions and updates changelogs. Merging that PR triggers a
# publish to npm.
# ==============================================================================

name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version Packages or Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write  # required for SLSA provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Opens a "Version Packages" PR when changesets are present.
          # Publishes to npm when the Version Packages PR is merged.
          publish: pnpm changeset publish --provenance
          version: pnpm changeset:version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attest build provenance
        if: steps.changesets.outputs.published == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            sdk/dist/**
            cli/dist/**
