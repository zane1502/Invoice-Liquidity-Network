version: '3.8'
services:
  stellar-quickstart:
    image: stellar/quickstart:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - "QUICKSTART_HTTP_PORT=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 5s
      timeout: 2s
      retries: 12
