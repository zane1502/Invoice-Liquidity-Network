name: Deploy contract

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network for deployment'
        required: true
        type: choice
        options:
          - testnet
          - mainnet
        default: testnet
      dry_run:
        description: 'Skip actual contract deployment'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.network }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network }}
    permissions:
      contents: read

    env:
      HORIZON_URL: ${{ github.event.inputs.network == 'mainnet' && secrets.MAINNET_HORIZON_URL || secrets.TESTNET_HORIZON_URL }}
      DEPLOYER_SECRET: ${{ github.event.inputs.network == 'mainnet' && secrets.MAINNET_DEPLOYER_SECRET || secrets.TESTNET_DEPLOYER_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deploy tooling
        run: npm install -g tsx

      - name: Dry run placeholder
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run selected; deployment skipped."

      - name: Deploy contract
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          export STELLAR_SECRET_KEY="$DEPLOYER_SECRET"
          export HORIZON_URL="$HORIZON_URL"
          npx tsx scripts/deploy.ts --network=${{ github.event.inputs.network }}
