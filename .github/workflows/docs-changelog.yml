name: Docs - Generate Changelog

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
      - docs/changelog-page
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  aggregate-changelog:
    name: Aggregate and Update Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run changelog aggregation
        working-directory: ${{ github.workspace }}
        run: node .local/repo-ops/aggregate-changelogs.js

      - name: Verify changelog was generated
        run: |
          if [ ! -f docs/changelog.md ]; then
            echo "❌ Changelog generation failed - docs/changelog.md not created"
            exit 1
          fi
          echo "✓ Changelog generated successfully"
          wc -l docs/changelog.md

      - name: Check if changelog changed
        id: changelog_diff
        run: |
          if git diff --quiet docs/changelog.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ No changes to changelog"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changelog updated"
            git diff --color=never docs/changelog.md | head -50
          fi

      - name: Commit and push changelog updates
        if: steps.changelog_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.md
          git commit -m "docs: update changelog aggregation

- Aggregate CHANGELOG.md entries
- Group by release date with semantic labels
- Auto-generated by docs-changelog workflow"
          git push

      - name: Comment on PR if triggered by PR
        if: github.event_name == 'pull_request' && steps.changelog_diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Changelog aggregation completed. Review updated [docs/changelog.md](../docs/changelog.md).'
            })

      - name: Report workflow status
        if: always()
        run: |
          echo "🔧 Workflow Status:"
          echo "  - Aggregation: $([ -f docs/changelog.md ] && echo '✓ Success' || echo '✗ Failed')"
          echo "  - Changes detected: $([ "${{ steps.changelog_diff.outputs.changed }}" == "true" ] && echo '✓ Yes' || echo '✗ No')"
